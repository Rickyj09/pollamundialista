{% extends "base.html" %}

{% block title %}Iniciar sesion{% endblock %}

{% block content %}
<div style="max-width: 460px; margin: 0 auto;">
    <h2 class="page-title">Iniciar sesion</h2>
    <p class="muted">Accede con tu correo y contrasena para registrar tus apuestas.</p>

    <form method="POST" action="{{ url_for('auth.login') }}">
        {% if next_url %}
            <input type="hidden" name="next" value="{{ next_url }}">
        {% endif %}

        <div class="form-group">
            <label for="email">Correo electronico</label>
            <input type="email" name="email" id="email" required autocomplete="email">
        </div>

        <div class="form-group">
            <label for="password">Contrasena</label>
            <input type="password" name="password" id="password" required autocomplete="current-password">
        </div>

        <div class="actions">
            <button type="submit" class="btn btn-primary">Ingresar</button>
            <a class="btn btn-secondary" href="{{ url_for('auth.register', next=next_url) if next_url else url_for('auth.register') }}">
                Crear cuenta
            </a>
        </div>
    </form>
</div>
{% endblock %}
